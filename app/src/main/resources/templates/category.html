<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Category Management - Favorites</title>
    <link rel="stylesheet" href="/webjars/bootstrap/3.3.7/css/bootstrap.min.css">
    <script src="/webjars/jquery/3.2.1/jquery.min.js"></script>
    <script src="/webjars/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container" style="margin-top: 60px;">
        <div class="row">
            <div class="col-md-8 col-md-offset-2">
                <h2>My Categories</h2>
                <hr>

                <div class="panel panel-default">
                    <div class="panel-heading">Add New Category</div>
                    <div class="panel-body">
                        <form id="addCategoryForm" class="form-inline">
                            <div class="form-group">
                                <input type="text" class="form-control" id="categoryName" placeholder="Category Name" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Add Category</button>
                        </form>
                    </div>
                </div>

                <div class="panel panel-default">
                    <div class="panel-heading">My Category List</div>
                    <div class="panel-body">
                        <table class="table table-striped" id="categoryTable">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Category Name</th>
                                    <th>Create Time</th>
                                    <th>Operation</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
                    <h4 class="modal-title">Edit Category</h4>
                </div>
                <div class="modal-body">
                    <form id="editCategoryForm">
                        <input type="hidden" id="editCategoryId">
                        <div class="form-group">
                            <label>Category Name</label>
                            <input type="text" class="form-control" id="editCategoryName" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveEditBtn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        $(document).ready(function() {
            loadCategoryList();

            $("#addCategoryForm").submit(function(e) {
                e.preventDefault();
                var name = $("#categoryName").val();
                $.post("/category/add", {name: name}, function(res) {
                    if (res.code === 200) {
                        alert(res.msg);
                        $("#categoryName").val("");
                        loadCategoryList();
                    } else {
                        alert(res.msg);
                    }
                });
            });

            $("#saveEditBtn").click(function() {
                var id = $("#editCategoryId").val();
                var name = $("#editCategoryName").val();
                $.post("/category/update", {id: id, name: name}, function(res) {
                    if (res.code === 200) {
                        alert(res.msg);
                        $("#editModal").modal("hide");
                        loadCategoryList();
                    } else {
                        alert(res.msg);
                    }
                });
            });
        });

        function loadCategoryList() {
            $.get("/category/list", function(res) {
                if (res.code === 200) {
                    var tbody = "";
                    res.data.forEach(function(item) {
                        tbody += "<tr>";
                        tbody += "<td>" + item.id + "</td>";
                        tbody += "<td>" + item.name + "</td>";
                        tbody += "<td>" + new Date(item.createTime).toLocaleString() + "</td>";
                        tbody += "<td>";
                        tbody += "<button class='btn btn-sm btn-info edit-btn' data-id='" + item.id + "' data-name='" + item.name + "'>Edit</button> ";
                        tbody += "<button class='btn btn-sm btn-danger delete-btn' data-id='" + item.id + "'>Delete</button>";
                        tbody += "</td>";
                        tbody += "</tr>";
                    });
                    $("#categoryTable tbody").html(tbody);

                    $(".edit-btn").click(function() {
                        $("#editCategoryId").val($(this).data("id"));
                        $("#editCategoryName").val($(this).data("name"));
                        $("#editModal").modal("show");
                    });

                    $(".delete-btn").click(function() {
                        if (confirm("Are you sure to delete this category?")) {
                            var id = $(this).data("id");
                            $.post("/category/delete", {id: id}, function(res) {
                                if (res.code === 200) {
                                    alert(res.msg);
                                    loadCategoryList();
                                } else {
                                    alert(res.msg);
                                }
                            });
                        }
                    });
                } else {
                    alert(res.msg);
                }
            });
        }
    </script>
</body>
</html>
