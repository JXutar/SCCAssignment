name: CI Pipeline

on:
  push:
    branches: [ master, feature/*, validation, your-branch-name ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # THE FIX: This spins up a temporary MySQL database just for this pipeline!
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: favorites
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Build and Package
      run: |
        cd app
        mvn clean package \
          -Dmaven.test.failure.ignore=true \
          -Dspring.boot.test.autoconfigure.filter.typeExcludeFilters=true \
          -Dspring.devtools.add-properties=false \
          -Dspring.devtools.restart.enabled=false
      env:
        # We tell it to connect to the temporary MySQL service we just created above!
        SPRING_PROFILES_ACTIVE: docker
        SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/favorites?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: root

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: favorites-web-jar
        path: app/target/*.jar
