name: CI Pipeline

on:
  push:
    branches: [ master, feature/*, validation, your-branch-name ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Build and Package
      run: |
        cd app
        mvn clean package \
          -Dmaven.test.skip=true \
          -DskipTests=true \
          -Dmaven.test.failure.ignore=true \
          -Dspring.boot.test.autoconfigure.filter.typeExcludeFilters=true \
          -Dspring.devtools.add-properties=false \
          -Dspring.devtools.restart.enabled=false
      env:
        SPRING_PROFILES_ACTIVE: docker
        SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/favorites
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: root

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: favorites-web-jar
        path: app/target/*.jar
