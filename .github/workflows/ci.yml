name: CI Pipeline

on:
  push:
    branches: [ master, feature/*, validation, your-branch-name ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: favorites
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Build and Package
      run: mvn -f app/pom.xml -B package --no-transfer-progress -Dspring.profiles.active=dev -Dspring.datasource.url=jdbc:mysql://127.0.0.1:3306/favorites -Dspring.datasource.username=root -Dspring.datasource.password=root

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: favorites-web-jar
        path: app/target/*.jar
