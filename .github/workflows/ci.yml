name: CI Pipeline

on:
  push:
    branches: [ master, feature/*, validation, garylim037:your-branch-name ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Build with Maven
      run: mvn clean compile -f app/pom.xml

    - name: Run Tests
      run: mvn test -f app/pom.xml

    - name: Package Application
      run: mvn package -f app/pom.xml -DskipTests

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v3
      with:
        name: favorites-web-jar
        path: app/target/*.jar