name: CI Pipeline

on:
  push:
    branches: [ master, feature/*, validation, your-branch-name ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Build and Package
      continue-on-error: true
      run: |
        cd app
        mvn clean package

    - name: Upload JAR artifact
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: favorites-web-jar
        path: app/target/*.jar
